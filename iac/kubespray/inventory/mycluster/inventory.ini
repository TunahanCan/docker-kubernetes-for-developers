[all]
master-1 ansible_host=<MASTER_IP> ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_rsa
worker-1 ansible_host=<WORKER_1_IP> ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_rsa
worker-2 ansible_host=<WORKER_2_IP> ansible_user=root ansible_ssh_private_key_file=~/.ssh/id_rsa

[kube_control_plane]
master-1

[etcd:children]
kube_control_plane

[kube_node]
worker-1
worker-2

[k8s_cluster:children]
kube_control_plane
kube_node
